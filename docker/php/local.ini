; -----------------------------------------------------------------------------
; Custom PHP Settings for Laravel (Production/Dev Optimized)
; -----------------------------------------------------------------------------

[PHP]
; Max execution time for scripts (useful for long-running tasks)
max_execution_time = 60

; Memory limit for PHP scripts (Laravel may require more for heavy queues/tasks)
memory_limit = 256M

; File upload limits
upload_max_filesize = 50M
post_max_size = 50M

; Security: Do not expose PHP version
expose_php = Off

[Date]
date.timezone = "UTC"

[opcache]
; OPcache optimizations
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000

; In production, set opcache.validate_timestamps=0 for max performance.
; In development, this is kept as 1 so changes reflect immediately.
opcache.validate_timestamps=1
opcache.revalidate_freq=0
