server {
    listen 80;
    listen [::]:80;
    
    # Root directory pointing to Laravel's public folder
    root /var/www/public;
    index index.php index.html;
    
    # Server name
    server_name _;

    # Standard Laravel Routing (try_files)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Configuration
    location ~ \.php$ {
        try_files $uri =404;
        
        # Route to the 'app' service on port 9000 (defined in docker-compose.yml)
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Security: Hide PHP version header
        fastcgi_hide_header X-Powered-By;
    }

    # Static file optimization
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    # Deny access to hidden files (e.g., .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}